<div class="login-wrap">
<div class="login-box">
<div class="login-logo">SC_ / login</div>

<div id="errorMsg" style="display:none;" class="alert-err mb-3">
Kullanıcı adı veya şifre hatalı.
</div>
<div id="emptyMsg" style="display:none;" class="alert-err mb-3">
Tüm alanları doldurun.
</div>
<div id="emailMsg" style="display:none;" class="alert-err mb-3">
Geçerli bir e-posta adresi girin.
</div>

<form id="loginForm" action="login.php" method="POST">
<div class="mb-3">
<label class="form-label">Kullanıcı Adı (E-posta)</label>
<input type="text" class="form-control" id="loginEmail" name="email" placeholder="bXXXXXXXXX@sakarya.edu.tr">
</div>
<div class="mb-4">
<label class="form-label">Şifre (Öğrenci No)</label>
<input type="password" class="form-control" id="loginPass" name="sifre" placeholder="bXXXXXXXXX">
</div>
<button type="button" class="btn-accent w-100" onclick="validateLogin()">Giriş Yap</button>
</form>

<p class="text-center mt-4 mono" style="font-size:0.7rem;color:var(--muted);">
Kimlik bilgileri öğrenci numaranızdır.
</p>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function validateLogin() {
const email = document.getElementById('loginEmail').value.trim();
const pass = document.getElementById('loginPass').value.trim();
const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

['errorMsg','emptyMsg','emailMsg'].forEach(id => document.getElementById(id).style.display = 'none');
document.getElementById('loginEmail').classList.remove('input-error');
document.getElementById('loginPass').classList.remove('input-error');

if (!email || !pass) {
document.getElementById('emptyMsg').style.display = 'block';
if (!email) document.getElementById('loginEmail').classList.add('input-error');
if (!pass) document.getElementById('loginPass').classList.add('input-error');
return;
}

if (!emailRe.test(email)) {
document.getElementById('emailMsg').style.display = 'block';
document.getElementById('loginEmail').classList.add('input-error');
return;
}

document.getElementById('loginForm').submit();
}

document.getElementById('loginPass').addEventListener('keydown', e => {
if (e.key === 'Enter') validateLogin();
});
</script>
</body>
